<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | HealthSys</title>
<script>
(function(){
    var storedTheme = localStorage.getItem("healthsys-theme");
    var theme = storedTheme || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page compact-auth-page">

<div id="loader">
    <div class="spinner"></div>
</div>

<header class="auth-header">
    <a class="brand" href="index.html">
        <span class="brand-mark">H</span>
        <span>HealthSys</span>
    </a>
    <button class="theme-toggle" type="button" data-theme-toggle>Dark mode</button>
</header>

<main class="single-form-shell">
    <section class="form-box show" aria-label="Forgot password form">
        <p class="eyebrow">Account recovery</p>
        <h2>Reset your password</h2>
        <p class="form-copy">Enter your email. If an account exists, a secure reset link will be sent and will expire in 15 minutes.</p>

        <label class="input-group" for="forgotEmail">
            <i class="fas fa-envelope" aria-hidden="true"></i>
            <input id="forgotEmail" type="email" placeholder="Email">
        </label>

        <button class="btn" id="forgotPasswordButton" onclick="forgotPassword()">Send Reset Link</button>
        <p id="forgotPasswordMessage" class="status-message" aria-live="polite"></p>
        <a class="form-link" href="login.html">Back to login</a>
    </section>
</main>

<script src="script.js"></script>

</body>
</html>
